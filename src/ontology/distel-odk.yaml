id: distel
title: "DiStEL Mechanical Testing Ontology"
github_org: materialdigital
git_main_branch: main
repo: DiStEL-Mechanical-Testing-Ontology
uribase: https://w3id.org/pmd
uribase_suffix: distel
preferredPrefix: DISTEL
edit_format: owl

# DISABLE Templates for now
use_templates: false

import_group:
  annotation_properties: ['rdfs:label', 'IAO:0000119','IAO:0000115', 'IAO:0000116', 'IAO:0000112', 'skos:definition', 'skos:example', 'skos:comment', 'skos:altLabel' ]
  
  products:
    - id: pmdco
      title: "PMD Core Ontology"
      # mirror_from: https://materialdigital.github.io/core-ontology/ontology.owl
      mirror_from: https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/src/ontology/pmdco.ttl
      module_type: custom
    - id: tto
      mirror_from: https://raw.githubusercontent.com/materialdigital/tensile-test-ontology/refs/heads/main/tto-full.owl 
      module_type: custom
    - id: uo
      mirror_from: https://raw.githubusercontent.com/bio-ontology-research-group/unit-ontology/refs/heads/master/uo-full.owl
      module_type: custom

# Components
components:
  products:
    - filename: imports-edit.owl
    - filename: distel-mech-axioms-shared.owl
    - filename: distel-mech-tensile-test.owl
    - filename: distel-mech-fatigue.owl
    - filename: distel-mech-hardness.owl
    - filename: distel-mech-device.owl
    - filename: distel-mech-materials.owl
    - filename: noes-shared.owl

# Release
primary_release: full
release_artefacts:
  - base
  - full
export_formats:
  - owl
  - ttl

ci:
  - github_actions

namespaces:
  - https://w3id.org/pmd/distel/
idranges:
  - idsfor: distel
    idprefix: https://w3id.org/pmd/distel/DISTEL_
    iddigits: 7

idranges:
  - idsfor: distel
    idprefix: https://w3id.org/pmd/distel/DISTEL_
    iddigits: 7

idranges:
  - idsfor: distel
    idprefix: https://w3id.org/pmd/distel/DISTEL_
    iddigits: 7
